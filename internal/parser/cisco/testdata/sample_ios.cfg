hostname edge-sw1
!
interface GigabitEthernet1/0/1
 description User access port
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface GigabitEthernet1/0/24
 description Uplink trunk
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
 shutdown
!
interface GigabitEthernet1/0/48
 description Routed uplink
 ip address 192.0.2.1 255.255.255.252
 no shutdown
!
vlan 10
 name USERS
!
vlan 20
 name SERVERS
!
ip route 0.0.0.0 0.0.0.0 192.0.2.2 10
ip route 203.0.113.0 255.255.255.0 GigabitEthernet1/0/48 198.51.100.1
access-list 10 permit 192.0.2.0 0.0.0.255
access-list 101 permit tcp any host 198.51.100.10 eq 443
