<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>netc path</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface-1: #ffffff;
      --surface-2: #fbfcfd;
      --ink: #182230;
      --muted: #667085;
      --border: #d8dee8;
      --accent: #155eef;
      --accent-soft: #e7efff;
      --ok: #067647;
      --ok-soft: #e7f6ee;
      --bad: #b42318;
      --bad-soft: #fdeceb;
      --warn: #b54708;
      --warn-soft: #fff2df;
      --neutral: #475467;
      --neutral-soft: #eef2f6;
      --focus: #155eef;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }
    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #111418;
      --surface-1: #171b21;
      --surface-2: #1d222a;
      --ink: #e6e9ef;
      --muted: #aab2c0;
      --border: #333a46;
      --accent: #7aa7ff;
      --accent-soft: #172946;
      --ok: #5fd49d;
      --ok-soft: #123426;
      --bad: #ff8a80;
      --bad-soft: #3d1716;
      --warn: #ffc46b;
      --warn-soft: #382713;
      --neutral: #c1c7d0;
      --neutral-soft: #252b34;
      --focus: #9bbcff;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 400 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, select {
      font: inherit;
      color: inherit;
    }
    button, input, select, summary, a {
      border-radius: 8px;
    }
    button:focus-visible, input:focus-visible, select:focus-visible, summary:focus-visible, a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }
    button {
      border: 0.5px solid var(--border);
      background: var(--surface-1);
      min-height: 36px;
      padding: 7px 10px;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 500;
    }
    [data-theme="dark"] button.primary { color: #0b1220; }
    button.subtle { color: var(--muted); }
    button[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }
    input, select {
      width: 100%;
      border: 0.5px solid var(--border);
      background: var(--surface-1);
      min-height: 36px;
      padding: 7px 9px;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface-1);
      border-bottom: 0.5px solid var(--border);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font: 500 15px/1 var(--mono);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 18px; font-weight: 500; }
    h2 { font-size: 16px; font-weight: 500; }
    h3 { font-size: 14px; font-weight: 500; }
    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 18px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .flow-card, .card, .verdict, .hop, .empty {
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      border-radius: 12px;
    }
    .flow-card {
      padding: 14px;
      margin-bottom: 14px;
    }
    .flow-grid {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(150px, 1fr) 120px 100px auto;
      align-items: end;
      gap: 10px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .button-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .editor-row {
      display: grid;
      grid-template-columns: minmax(210px, 1fr) auto;
      gap: 8px;
      align-items: end;
      min-width: min(100%, 420px);
    }
    .status-line {
      color: var(--muted);
      min-height: 21px;
    }
    .grid {
      display: grid;
      gap: 14px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .metric {
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .metric .label {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }
    .metric .value {
      display: block;
      margin-top: 2px;
      font-size: 24px;
      font-weight: 500;
      line-height: 1.2;
    }
    .verdict {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-color: var(--verdict-border, var(--border));
      background: var(--verdict-bg, var(--surface-1));
    }
    .verdict-icon {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 0.5px solid var(--verdict-border, var(--border));
      border-radius: 10px;
      color: var(--verdict-color, var(--neutral));
      font-weight: 500;
    }
    .verdict-title {
      font-size: 18px;
      font-weight: 500;
    }
    .verdict-copy {
      color: var(--muted);
    }
    .ok { --verdict-color: var(--ok); --verdict-bg: var(--ok-soft); --verdict-border: color-mix(in srgb, var(--ok) 45%, var(--border)); }
    .bad { --verdict-color: var(--bad); --verdict-bg: var(--bad-soft); --verdict-border: color-mix(in srgb, var(--bad) 45%, var(--border)); }
    .warn { --verdict-color: var(--warn); --verdict-bg: var(--warn-soft); --verdict-border: color-mix(in srgb, var(--warn) 45%, var(--border)); }
    .neutral { --verdict-color: var(--neutral); --verdict-bg: var(--neutral-soft); --verdict-border: var(--border); }
    .chip, .vendor, .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      padding: 3px 8px;
      font-size: 13px;
      white-space: nowrap;
    }
    .chip.action {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-soft);
      cursor: pointer;
    }
    .vendor {
      color: var(--ink);
      font-family: var(--mono);
      font-size: 12px;
    }
    .vendor::before {
      content: attr(data-mark);
      display: inline-grid;
      place-items: center;
      min-width: 18px;
      height: 18px;
      border-radius: 6px;
      background: var(--neutral-soft);
      color: var(--accent);
      font-family: var(--mono);
      font-weight: 500;
    }
    .ribbon {
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .ribbon-track {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .endpoint, .ribbon-hop {
      border: 0.5px solid var(--border);
      background: var(--surface-2);
      border-radius: 999px;
      padding: 6px 9px;
      min-width: 0;
    }
    .ribbon-hop {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      max-width: 190px;
    }
    .ribbon-hop .name, .endpoint {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--neutral);
      flex: 0 0 auto;
    }
    .dot.ok { background: var(--ok); }
    .dot.bad { background: var(--bad); }
    .dot.warn { background: var(--warn); }
    .link {
      flex: 1 1 22px;
      min-width: 18px;
      height: 1px;
      background: var(--border);
    }
    .hop-list {
      display: grid;
      gap: 10px;
    }
    .hop {
      scroll-margin-top: 86px;
      overflow: clip;
    }
    .hop summary {
      list-style: none;
      cursor: pointer;
      padding: 13px 14px;
    }
    .hop summary::-webkit-details-marker { display: none; }
    .hop-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .chevron {
      color: var(--muted);
      font-family: var(--mono);
      transition: transform 120ms ease;
    }
    details[open] .chevron { transform: rotate(90deg); }
    .hop-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }
    .hop-title strong {
      font-weight: 500;
      overflow-wrap: anywhere;
    }
    .hop-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .hop-body {
      border-top: 0.5px solid var(--border);
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .pipeline {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    .step {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface-2);
      padding: 10px;
      min-width: 0;
    }
    .step .label {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }
    .step .value {
      display: block;
      margin-top: 3px;
      font-weight: 500;
      overflow-wrap: anywhere;
    }
    .step.ok { border-color: var(--ok); background: var(--ok-soft); color: var(--ink); }
    .step.bad { border-color: var(--bad); background: var(--bad-soft); color: var(--ink); }
    .evidence-grid {
      display: grid;
      gap: 10px;
    }
    .evidence-card {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface-2);
      overflow: hidden;
    }
    .evidence-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-bottom: 0.5px solid var(--border);
    }
    .evidence-title {
      min-width: 0;
    }
    .evidence-title code {
      display: block;
      color: var(--ink);
      overflow-wrap: anywhere;
    }
    .evidence-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    pre.conf {
      margin: 0;
      padding: 10px 0;
      overflow-x: auto;
      overflow-y: visible;
      background: var(--surface-1);
      font: 400 13px/1.45 var(--mono);
    }
    .code-line {
      display: grid;
      grid-template-columns: 58px minmax(max-content, 1fr);
      gap: 12px;
      min-height: 19px;
      padding: 0 10px;
    }
    .code-line.context {
      opacity: 0.62;
    }
    .code-line.match {
      opacity: 1;
      background: var(--evidence-match, var(--accent-soft));
      color: var(--ink);
    }
    .line-no {
      color: var(--muted);
      text-align: right;
      user-select: none;
    }
    code, .mono {
      font-family: var(--mono);
      font-size: 13px;
    }
    .legend {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px;
    }
    .gallery-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .gallery-label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .layer-tag {
      display: inline-flex;
      align-items: center;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .layer-tag.predicted {
      color: var(--neutral);
      background: var(--neutral-soft);
    }
    .layer-tag.observed {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    }
    .agreement {
      margin-bottom: 0;
    }
    .agreement.mismatch {
      border-width: 1px;
    }
    .ribbon-hop .observed-ring {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid transparent;
      flex: 0 0 auto;
    }
    .ribbon-hop .observed-ring.reachable { border-color: var(--ok); background: var(--ok-soft); }
    .ribbon-hop .observed-ring.unreachable { border-color: var(--bad); background: var(--bad-soft); }
    .ribbon-hop .observed-ring.inconclusive { border-color: var(--neutral); background: var(--neutral-soft); }
    .ribbon-hop.mismatch-hop {
      border-color: color-mix(in srgb, var(--warn) 55%, var(--border));
      background: var(--warn-soft);
    }
    .diag-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .diag-menu {
      position: relative;
      display: inline-flex;
    }
    .diag-menu > summary {
      list-style: none;
      cursor: pointer;
      border: 0.5px solid var(--border);
      background: var(--surface-2);
      min-height: 32px;
      padding: 5px 9px;
      font-size: 13px;
    }
    .diag-menu > summary::-webkit-details-marker { display: none; }
    .diag-menu[open] > summary {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }
    .diag-menu-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      z-index: 5;
      min-width: 190px;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface-1);
      padding: 6px;
      display: grid;
      gap: 4px;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--ink) 12%, transparent);
    }
    .diag-menu-panel button {
      width: 100%;
      text-align: left;
      min-height: 32px;
      font-size: 13px;
    }
    .diag-menu-panel button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .diag-panel {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface-2);
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .diag-panel.observed {
      border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
    }
    .diag-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .diag-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 13px;
      font-weight: 500;
    }
    .diag-status.ok { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 45%, var(--border)); background: var(--ok-soft); }
    .diag-status.unreachable { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 45%, var(--border)); background: var(--bad-soft); }
    .diag-status.timeout { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 45%, var(--border)); background: var(--warn-soft); }
    .diag-status.denied { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 45%, var(--border)); background: var(--bad-soft); }
    .diag-status.needs_approval { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 45%, var(--border)); background: var(--warn-soft); }
    .diag-status.error { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 45%, var(--border)); background: var(--bad-soft); }
    .diag-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .class-badge {
      display: inline-flex;
      align-items: center;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      font-family: var(--mono);
      text-transform: lowercase;
    }
    .class-badge.config {
      color: var(--bad);
      border-color: color-mix(in srgb, var(--bad) 40%, var(--border));
      background: var(--bad-soft);
    }
    .class-badge.exec {
      color: var(--warn);
      border-color: color-mix(in srgb, var(--warn) 40%, var(--border));
      background: var(--warn-soft);
    }
    .class-badge.diagnostic {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 40%, var(--border));
      background: var(--ok-soft);
    }
    .diag-command {
      margin: 0;
      padding: 10px;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface-1);
      font: 400 13px/1.45 var(--mono);
      overflow-x: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .diag-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .diag-stat {
      border: 0.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface-1);
      padding: 8px 10px;
    }
    .diag-stat .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .diag-stat .value {
      display: block;
      margin-top: 2px;
      font-weight: 500;
    }
    .traceroute-list {
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .traceroute-list li {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 8px;
      align-items: center;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface-1);
      padding: 6px 8px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .compare-card {
      border: 0.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface-1);
      padding: 10px;
      display: grid;
      gap: 6px;
      min-width: 0;
    }
    .compare-card.observed.disagree {
      border-color: color-mix(in srgb, var(--warn) 50%, var(--border));
      background: var(--warn-soft);
    }
    .compare-card .heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .approval-encart {
      border: 0.5px solid color-mix(in srgb, var(--warn) 50%, var(--border));
      border-radius: 10px;
      background: var(--warn-soft);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .approval-encart p {
      color: var(--muted);
      font-size: 13px;
    }
    .approval-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 8px;
      align-items: end;
    }
    .raw-output {
      border: 0.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface-1);
      overflow: hidden;
    }
    .raw-output > summary {
      cursor: pointer;
      padding: 9px 10px;
      color: var(--muted);
      font-size: 13px;
      list-style: none;
    }
    .raw-output > summary::-webkit-details-marker { display: none; }
    .raw-output pre {
      margin: 0;
      padding: 10px;
      border-top: 0.5px solid var(--border);
      font: 400 13px/1.45 var(--mono);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .redacted-note {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
    }
    .audit-line {
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }
    .empty {
      padding: 18px;
      color: var(--muted);
    }
    .hidden { display: none !important; }
    @media (max-width: 920px) {
      .flow-grid {
        grid-template-columns: 1fr 1fr;
      }
      .flow-grid button.primary {
        grid-column: 1 / -1;
      }
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .pipeline {
        grid-template-columns: 1fr 1fr;
      }
      .verdict {
        grid-template-columns: auto 1fr;
      }
      .verdict .chip {
        grid-column: 1 / -1;
        width: fit-content;
      }
    }
    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      main { padding: 12px; }
      .flow-grid, .editor-row, .metrics, .pipeline {
        grid-template-columns: 1fr;
      }
      .ribbon-track {
        align-items: stretch;
        flex-direction: column;
      }
      .link {
        width: 1px;
        height: 14px;
        min-width: 1px;
        flex: 0 0 14px;
        margin-left: 18px;
      }
      .ribbon-hop, .endpoint {
        max-width: none;
        width: 100%;
      }
      .hop-head {
        grid-template-columns: auto 1fr;
      }
      .hop-meta {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
      .evidence-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .evidence-actions {
        justify-content: flex-start;
      }
      .compare-grid, .diag-stats {
        grid-template-columns: 1fr;
      }
      .approval-row {
        grid-template-columns: 1fr;
      }
    }
    .hop.diff-changed {
      border-color: color-mix(in srgb, var(--warn) 55%, var(--border));
      background: var(--warn-soft);
    }
    .hop.diff-added {
      border-color: color-mix(in srgb, var(--ok) 55%, var(--border));
    }
    .hop.diff-removed {
      opacity: 0.72;
      border-style: dashed;
    }
    .diff-banner {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface-1);
      padding: 12px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .validation-history {
      margin-top: 10px;
    }
    .view-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      margin-top: 10px;
    }
    .view-toolbar label {
      display: grid;
      gap: 4px;
      font-size: 13px;
      color: var(--muted);
    }
    .view-toolbar select {
      min-width: 180px;
      min-height: 36px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      background: var(--surface-1);
    }
    .pipeline.decisions-only .step:not(.decision) {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">pt</div>
        <div>
          <h1>netc path</h1>
          <p class="status-line" id="statusText">Ready</p>
        </div>
      </div>
      <div class="button-row">
        <button type="button" id="validateButton" class="primary">Valider le chemin</button>
        <button type="button" id="rerunValidateButton" class="subtle hidden">Re-run validation</button>
        <button type="button" id="copyValidationButton" class="subtle hidden">Copy validation JSON</button>
        <button type="button" id="copyPermalinkButton" class="subtle">Copy permalink</button>
        <button type="button" id="themeButton" class="subtle" aria-pressed="false">Dark</button>
        <button type="button" id="copyJsonButton" class="subtle">Copy path JSON</button>
      </div>
    </div>
  </header>

  <main>
    <p class="sr-only" id="screenSummary">Network path viewer. Use the flow form to trace, arrow keys to move between hops, enter to open a hop, and c to copy focused evidence.</p>

    <section class="flow-card" aria-labelledby="flowTitle">
      <h2 id="flowTitle" class="sr-only">Flow</h2>
      <form id="flowForm" class="flow-grid">
        <label>Source
          <input id="srcInput" name="src" autocomplete="off" inputmode="numeric" placeholder="10.0.10.55">
        </label>
        <label>Destination
          <input id="dstInput" name="dst" autocomplete="off" inputmode="numeric" placeholder="192.168.50.20">
        </label>
        <label>Protocol
          <select id="protoInput" name="proto">
            <option value="tcp">tcp</option>
            <option value="udp">udp</option>
            <option value="icmp">icmp</option>
          </select>
        </label>
        <label>Port
          <input id="dportInput" name="dport" type="number" min="0" max="65535" placeholder="443">
        </label>
        <button class="primary" type="submit">Trace</button>
      </form>
      <div class="toolbar">
        <div>
          <div class="gallery-group" aria-label="Path fixture gallery">
            <span class="gallery-label">Path</span>
            <div class="button-row" id="gallery"></div>
          </div>
          <div class="gallery-group" style="margin-top:8px" aria-label="Diagnostic fixture gallery">
            <span class="gallery-label">Diag</span>
            <div class="button-row" id="diagGallery"></div>
          </div>
        </div>
        <div class="editor-row">
          <label>Editor URL
            <input id="editorTemplate" autocomplete="off" spellcheck="false" value="vscode://file/{path}:{line}" aria-label="Editor URL template">
          </label>
          <button type="button" id="saveEditorButton" class="subtle">Save</button>
        </div>
      </div>
      <div class="view-toolbar">
        <label>Pipeline view
          <select id="viewModeSelect" aria-label="Pipeline view mode">
            <option value="full">Full pipeline</option>
            <option value="decisions">Decision points only</option>
          </select>
        </label>
        <label><input type="checkbox" id="diffModeToggle"> Diff mode</label>
        <button type="button" id="markBeforeButton" class="subtle" disabled>Mark as before</button>
        <span id="diffStatus" class="gallery-label"></span>
      </div>
      <div class="validation-history hidden" id="validationHistoryPanel">
        <span class="gallery-label">Recent validations</span>
        <div class="button-row" id="validationHistoryList"></div>
      </div>
    </section>

    <section class="grid" aria-live="polite">
      <div id="errorBox" class="empty hidden" role="alert"></div>
      <div id="diffBanner" class="diff-banner hidden" aria-live="polite"></div>
      <div id="verdictBanner"></div>
      <div id="agreementBanner"></div>
      <div class="metrics" id="metrics"></div>
      <div class="ribbon" id="ribbon"></div>
      <div class="hop-list" id="hopList"></div>
      <div class="card legend" id="legend"></div>
    </section>
  </main>

  <script>
    const verdicts = ["delivered", "no_route", "dropped_acl", "dropped_policy", "loop"];
    const diagFixtures = [
      { id: "diag/ping_ok", title: "Ping ok" },
      { id: "diag/exec_needs_approval", title: "Needs approval" },
      { id: "diag/config_denied", title: "Config denied" },
      { id: "diag/path_validate_match", title: "Validate match" },
      { id: "diag/path_validate_mismatch", title: "Validate mismatch" }
    ];
    const VALIDATION_HISTORY_KEY = "netc.path.validationHistory";
    const state = {
      path: null,
      pathBefore: null,
      pathAfter: null,
      validation: null,
      hopDiag: {},
      approvalTokens: {},
      pendingDiag: {},
      activeFixture: "",
      activeDiagFixture: "",
      focusedHop: -1,
      viewMode: localStorage.getItem("netc.path.viewMode") || "full",
      diffMode: localStorage.getItem("netc.path.diffMode") === "1",
      open: new Set(JSON.parse(localStorage.getItem("netc.path.open") || "[0]")),
      editorTemplate: localStorage.getItem("netc.path.editor") || "vscode://file/{path}:{line}"
    };
    const $ = (id) => document.getElementById(id);

    const verdictMeta = {
      delivered: { tone: "ok", icon: "ok", title: "Delivered", copy: "The destination subnet is owned by the final device." },
      no_route: { tone: "warn", icon: "nr", title: "No route", copy: "Routing stopped because no L3 route or next hop resolution was available." },
      dropped_acl: { tone: "bad", icon: "acl", title: "Dropped by ACL", copy: "A matching access-list entry denied the flow." },
      dropped_policy: { tone: "bad", icon: "pol", title: "Dropped by policy", copy: "A firewall security policy denied the flow or no policy matched." },
      loop: { tone: "warn", icon: "lp", title: "Loop", copy: "A device repeated in the trace or the hop limit was reached." }
    };

    const diagStatusMeta = {
      ok: { tone: "ok", icon: "✓", label: "Ok" },
      unreachable: { tone: "unreachable", icon: "✕", label: "Unreachable" },
      timeout: { tone: "timeout", icon: "⏱", label: "Timeout" },
      denied: { tone: "denied", icon: "⊘", label: "Denied" },
      needs_approval: { tone: "needs_approval", icon: "!", label: "Needs approval" },
      error: { tone: "error", icon: "?", label: "Error" }
    };

    const observedMeta = {
      reachable: { tone: "reachable", label: "Reachable" },
      unreachable: { tone: "unreachable", label: "Unreachable" },
      inconclusive: { tone: "inconclusive", label: "Inconclusive" }
    };

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function qs(params) {
      const out = new URLSearchParams();
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value).trim() !== "") out.set(key, value);
      });
      return out.toString();
    }

    async function getJSON(url) {
      const response = await fetch(url, { headers: { "accept": "application/json" } });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.error || response.statusText);
      return body;
    }

    async function postJSON(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "accept": "application/json", "content-type": "application/json" },
        body: JSON.stringify(payload || {})
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.error || response.statusText);
      return body;
    }

    function setStatus(text) {
      $("statusText").textContent = text;
    }

    function setError(error) {
      const box = $("errorBox");
      if (!error) {
        box.classList.add("hidden");
        box.textContent = "";
        return;
      }
      box.classList.remove("hidden");
      box.textContent = error;
    }

    function setInputsFromFlow(flow) {
      if (!flow) return;
      $("srcInput").value = flow.src || "";
      $("dstInput").value = flow.dst || "";
      $("protoInput").value = flow.proto || "tcp";
      $("dportInput").value = flow.dport || "";
    }

    function flowFromInputs() {
      return {
        src: $("srcInput").value.trim(),
        dst: $("dstInput").value.trim(),
        proto: $("protoInput").value.trim(),
        dport: $("dportInput").value.trim()
      };
    }

    function flowURL(flow, extra) {
      const params = new URLSearchParams(qs(flow));
      Object.entries(extra || {}).forEach(([key, value]) => {
        if (value) params.set(key, value);
      });
      return "/path?" + params.toString();
    }

    function updateValidationButtons() {
      const hasValidation = Boolean(state.validation);
      $("rerunValidateButton").classList.toggle("hidden", !hasValidation);
      $("copyValidationButton").classList.toggle("hidden", !hasValidation);
    }

    function loadValidationHistory() {
      try {
        return JSON.parse(localStorage.getItem(VALIDATION_HISTORY_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function pushValidationHistory(flow, validation) {
      const entry = {
        at: new Date().toISOString(),
        flow,
        validation,
        agreement: validation?.agreement || "",
        observed: validation?.observed_verdict || ""
      };
      const history = loadValidationHistory().filter((item) =>
        JSON.stringify(item.flow) !== JSON.stringify(flow) || item.agreement !== entry.agreement
      );
      history.unshift(entry);
      localStorage.setItem(VALIDATION_HISTORY_KEY, JSON.stringify(history.slice(0, 10)));
      renderValidationHistory();
    }

    function renderValidationHistory() {
      const history = loadValidationHistory();
      const panel = $("validationHistoryPanel");
      const list = $("validationHistoryList");
      if (!history.length) {
        panel.classList.add("hidden");
        list.innerHTML = "";
        return;
      }
      panel.classList.remove("hidden");
      list.innerHTML = history.map((item, index) => {
        const flow = item.flow || {};
        const label = [flow.src, flow.dst, flow.proto, flow.dport].filter(Boolean).join(" · ") +
          " · " + (item.agreement || "unknown");
        return '<button type="button" class="subtle" data-history-index="' + index + '" title="' + esc(item.at || "") + '">' + esc(label) + '</button>';
      }).join("");
    }

    function restoreValidationHistory(index) {
      const item = loadValidationHistory()[index];
      if (!item) return;
      if (item.flow) {
        setInputsFromFlow(item.flow);
        state.path = null;
        state.validation = null;
        traceFlow(true).then(() => {
          if (item.validation) applyValidation(item.validation);
        });
        return;
      }
      if (item.validation) applyValidation(item.validation);
    }

    function hopSignature(hop) {
      if (!hop) return "";
      return JSON.stringify({
        device: hop.device || "",
        ingress: hop.ingress_iface || "",
        egress: hop.egress_iface || "",
        route: hop.route_match?.destination || "",
        acl: hop.acl_match?.raw || hop.acl_match?.action || "",
        policy: hop.policy_match?.name || "",
        nat: hop.nat_applied?.name || "",
        next: hop.next_hop || ""
      });
    }

    function diffHopMeta(index) {
      if (!state.pathBefore || !state.pathAfter) return "";
      const before = state.pathBefore.hops?.[index];
      const after = state.pathAfter.hops?.[index];
      if (!before && after) return "added";
      if (before && !after) return "removed";
      if (before && after && hopSignature(before) !== hopSignature(after)) return "changed";
      return "";
    }

    function renderDiffBanner() {
      const banner = $("diffBanner");
      if (!state.pathBefore || !state.pathAfter) {
        banner.classList.add("hidden");
        banner.innerHTML = "";
        return;
      }
      const beforeVerdict = state.pathBefore.verdict || "unknown";
      const afterVerdict = state.pathAfter.verdict || "unknown";
      const changed = Math.max(state.pathBefore.hops?.length || 0, state.pathAfter.hops?.length || 0);
      let hopChanges = 0;
      for (let i = 0; i < changed; i++) {
        if (diffHopMeta(i)) hopChanges++;
      }
      banner.classList.remove("hidden");
      banner.innerHTML =
        '<div><strong>Path diff</strong> · before ' + esc(beforeVerdict) + ' · after ' + esc(afterVerdict) +
        ' · ' + hopChanges + ' hop(s) changed</div>' +
        '<button type="button" class="subtle" id="clearDiffButton">Clear diff</button>';
    }

    function clearDiff() {
      state.pathBefore = null;
      state.pathAfter = null;
      $("diffStatus").textContent = "";
      renderDiffBanner();
      renderHops();
      renderRibbon();
    }

    function setDiffStatus(text) {
      $("diffStatus").textContent = text || "";
    }

    function applyDiffTrace(path) {
      if (!state.diffMode) {
        state.path = path;
        return;
      }
      if (!state.pathBefore) {
        state.pathBefore = path;
        state.path = path;
        setDiffStatus("Before path captured — trace again for after");
        return;
      }
      state.pathAfter = path;
      state.path = path;
      setDiffStatus("After path captured — diff active");
      renderDiffBanner();
    }

    async function traceFlow(updateURL) {
      const flow = flowFromInputs();
      if (!flow.src || !flow.dst || !flow.proto) {
        setError("Source, destination and protocol are required.");
        return;
      }
      setError("");
      clearValidation();
      setStatus("Tracing");
      try {
        const data = await getJSON("/api/path?" + qs(flow));
        if (updateURL) history.replaceState(null, "", flowURL(flow));
        state.activeFixture = "";
        state.activeDiagFixture = "";
        applyDiffTrace(data);
        renderPath(state.path);
        setStatus(state.diffMode && state.pathAfter ? "Diff trace rendered" : "Trace rendered from /api/path");
      } catch (error) {
        setError(error.message);
        setStatus("Trace failed");
      }
    }

    function clearValidation() {
      state.validation = null;
      state.hopDiag = {};
      state.approvalTokens = {};
      state.pendingDiag = {};
    }

    async function validatePath() {
      const flow = flowFromInputs();
      if (!flow.src || !flow.dst || !flow.proto) {
        setError("Source, destination and protocol are required.");
        return;
      }
      if (!state.path || !(state.path.hops || []).length) {
        setError("Trace a path before validating.");
        return;
      }
      setError("");
      setStatus("Validating path");
      try {
        const data = await postJSON("/api/path/validate", flow);
        applyValidation(data);
        pushValidationHistory(flow, data);
        if (history.replaceState) history.replaceState(null, "", flowURL(flow, { validated: "1" }));
        state.activeDiagFixture = "";
        setStatus("Path validation rendered from /api/path/validate");
      } catch (error) {
        setError(error.message);
        setStatus("Path validation failed");
      }
    }

    function applyValidation(validation) {
      state.validation = validation || null;
      renderAgreement();
      renderRibbon();
      renderHops();
      renderLegend();
      updateValidationButtons();
      $("screenSummary").textContent = summaryText();
    }

    function renderPath(path) {
      state.path = path || null;
      state.focusedHop = Math.min(state.focusedHop, (path?.hops?.length || 1) - 1);
      if (state.focusedHop < 0 && (path?.hops?.length || 0) > 0) state.focusedHop = 0;
      if (path?.flow) setInputsFromFlow(path.flow);
      renderGallery(path?.verdict || state.activeFixture);
      renderDiagGallery(state.activeDiagFixture);
      renderVerdict();
      renderAgreement();
      renderMetrics();
      renderRibbon();
      renderHops();
      renderLegend();
      renderDiffBanner();
      updateValidationButtons();
      $("markBeforeButton").disabled = !(path?.hops?.length);
      $("screenSummary").textContent = summaryText();
    }

    function summaryText() {
      const path = state.path || {};
      const flow = path.flow || {};
      let text = "Path verdict " + (path.verdict || "unknown") + " from " + (flow.src || "source") + " to " + (flow.dst || "destination") + " with " + ((path.hops || []).length) + " hops.";
      if (state.validation?.agreement) {
        text += " Validation agreement " + state.validation.agreement + ".";
      }
      if (state.pathBefore && state.pathAfter) {
        text += " Path diff active.";
      }
      return text;
    }

    async function runDiag(hopIndex, command, args, approvalToken) {
      const hop = state.path?.hops?.[hopIndex];
      if (!hop?.device) {
        setError("Hop device is missing.");
        return;
      }
      setError("");
      setStatus("Running diagnostic");
      const body = {
        target: hop.device,
        command,
        args: args || {},
        approval_token: approvalToken || state.approvalTokens[hopIndex] || ""
      };
      state.pendingDiag[hopIndex] = { command, args: args || {} };
      try {
        const data = await postJSON("/api/diag", body);
        state.hopDiag[hopIndex] = data;
        state.activeDiagFixture = "";
        renderHops();
        setStatus("Diagnostic rendered from /api/diag");
      } catch (error) {
        setError(error.message);
        setStatus("Diagnostic failed");
      }
    }

    function parseDiagAction(value) {
      const parts = String(value || "").split(":");
      const hopIndex = Number(parts[0]);
      const command = parts[1] || "";
      const raw = parts.slice(2).join(":");
      if (!command) return null;
      if (command === "ping" || command === "traceroute") {
        return { hopIndex, command, args: { dst: raw, count: 5 } };
      }
      if (command === "show" || command === "exec") {
        return { hopIndex, command, args: { raw } };
      }
      return { hopIndex, command, args: {} };
    }

    async function loadFixture(verdict) {
      setError("");
      clearValidation();
      clearDiff();
      setStatus("Loading fixture");
      try {
        const data = await getJSON("/path/fixtures/" + verdict + ".json");
        setInputsFromFlow(data.flow);
        state.activeFixture = verdict;
        state.activeDiagFixture = "";
        state.pathBefore = null;
        state.pathAfter = null;
        renderPath(data);
        setStatus("Fixture rendered: " + verdict);
      } catch (error) {
        setError(error.message);
        setStatus("Fixture failed");
      }
    }

    async function loadDiagFixture(fixtureId) {
      setError("");
      clearValidation();
      setStatus("Loading diagnostic fixture");
      try {
        if (fixtureId.startsWith("diag/path_validate_")) {
          const validation = await getJSON("/path/fixtures/" + fixtureId + ".json");
          const path = await getJSON("/path/fixtures/delivered.json");
          setInputsFromFlow(validation.flow || path.flow);
          state.activeFixture = "delivered";
          state.activeDiagFixture = fixtureId;
          renderPath(path);
          applyValidation(validation);
          setStatus("Diagnostic fixture rendered: " + fixtureId);
          return;
        }
        const diag = await getJSON("/path/fixtures/" + fixtureId + ".json");
        const path = await getJSON("/path/fixtures/delivered.json");
        setInputsFromFlow(path.flow);
        state.activeFixture = "delivered";
        state.activeDiagFixture = fixtureId;
        renderPath(path);
        const hopIndex = findHopIndexForDevice(diag.target);
        const hop = path.hops?.[hopIndex] || {};
        state.hopDiag[hopIndex] = diag;
        if (diag.command) {
          state.pendingDiag[hopIndex] = {
            command: diag.command,
            args: diag.command === "ping" || diag.command === "traceroute"
              ? { dst: diag.parsed?.ping ? (hop.next_hop || path.flow?.dst || "") : (path.flow?.dst || ""), count: 5 }
              : { raw: diag.rendered_command || "" }
          };
        }
        renderHops();
        setStatus("Diagnostic fixture rendered: " + fixtureId);
      } catch (error) {
        setError(error.message);
        setStatus("Diagnostic fixture failed");
      }
    }

    function findHopIndexForDevice(device) {
      const hops = state.path?.hops || [];
      const index = hops.findIndex((hop) => hop.device === device);
      return index >= 0 ? index : 0;
    }

    function renderGallery(active) {
      $("gallery").innerHTML = verdicts.map((verdict) => {
        const meta = verdictMeta[verdict];
        const pressed = active === verdict && !state.activeDiagFixture;
        return '<button type="button" data-fixture="' + esc(verdict) + '" aria-pressed="' + String(pressed) + '">' + esc(meta.title) + '</button>';
      }).join("");
    }

    function renderDiagGallery(active) {
      $("diagGallery").innerHTML = diagFixtures.map((fixture) =>
        '<button type="button" data-diag-fixture="' + esc(fixture.id) + '" aria-pressed="' + String(active === fixture.id) + '">' + esc(fixture.title) + '</button>'
      ).join("");
    }

    function renderAgreement() {
      const validation = state.validation;
      const box = $("agreementBanner");
      if (!validation) {
        box.innerHTML = "";
        return;
      }
      const agreement = validation.agreement || "mismatch";
      const tone = agreement === "match" ? "ok" : "warn";
      const title = agreement === "match"
        ? "Le réseau confirme le calcul"
        : "Divergence calcul ↔ réseau";
      const copy = agreement === "match"
        ? "Observed reachability matches the compiled verdict."
        : "Live checks disagree with the deterministic path — inspect hops and evidence.";
      const predicted = validation.predicted_verdict || state.path?.verdict || "unknown";
      const observed = validation.observed_verdict || "unknown";
      box.innerHTML =
        '<section class="verdict agreement ' + esc(tone) + (agreement === "mismatch" ? " mismatch" : "") + '" aria-labelledby="agreementTitle">' +
          '<div class="verdict-icon" aria-hidden="true">' + esc(agreement === "match" ? "✓" : "!") + '</div>' +
          '<div>' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">' +
              '<span class="layer-tag observed">Observé</span>' +
              '<h2 id="agreementTitle" class="verdict-title">' + esc(title) + '</h2>' +
            '</div>' +
            '<p class="verdict-copy">' + esc(copy) + '</p>' +
          '</div>' +
          '<span class="chip">Predicted ' + esc(predicted) + ' · Observed ' + esc(observed) + '</span>' +
        '</section>';
    }

    function checkForDevice(device) {
      return (state.validation?.checks || []).find((check) => check.from_device === device) || null;
    }

    function renderVerdict() {
      const path = state.path || {};
      const meta = verdictMeta[path.verdict] || { tone: "neutral", icon: "?", title: path.verdict || "No path", copy: "No path data is loaded." };
      const reason = path.reason;
      $("verdictBanner").innerHTML =
        '<section class="verdict ' + esc(meta.tone) + '" aria-labelledby="verdictTitle">' +
          '<div class="verdict-icon" aria-hidden="true">' + esc(meta.icon) + '</div>' +
          '<div>' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">' +
              '<span class="layer-tag predicted">Prédit</span>' +
              '<h2 id="verdictTitle" class="verdict-title">' + esc(meta.title) + '</h2>' +
            '</div>' +
            '<p class="verdict-copy">' + esc(meta.copy) + '</p>' +
          '</div>' +
          reasonChip(reason) +
        '</section>';
    }

    function reasonChip(reason) {
      if (!reason || !reason.file) return '<span class="chip">No reason evidence</span>';
      const label = reason.file + ":" + (reason.start_line || "?");
      const hopIndex = findReasonHop(reason);
      return '<button type="button" class="chip action" data-reason-hop="' + hopIndex + '" title="Open responsible evidence">' + esc(label) + '</button>';
    }

    function findReasonHop(reason) {
      const hops = state.path?.hops || [];
      for (let i = 0; i < hops.length; i++) {
        const evidences = evidenceItems(hops[i]).map((item) => item.evidence);
        if (evidences.some((ev) => sameEvidence(ev, reason))) return i;
      }
      return hops.length > 0 ? hops.length - 1 : -1;
    }

    function sameEvidence(a, b) {
      return a && b && a.file === b.file && Number(a.start_line || 0) === Number(b.start_line || 0) && Number(a.end_line || 0) === Number(b.end_line || 0);
    }

    function renderMetrics() {
      const hops = state.path?.hops || [];
      const devices = new Set(hops.map((hop) => hop.device).filter(Boolean));
      const vendors = new Set(hops.map((hop) => hop.vendor).filter(Boolean));
      const metrics = [
        ["Hops", hops.length],
        ["Devices", devices.size],
        ["Vendors", vendors.size],
        ["Verdict", state.path?.verdict || "none"]
      ];
      $("metrics").innerHTML = metrics.map(([label, value]) =>
        '<article class="metric"><span class="label">' + esc(label) + '</span><span class="value">' + esc(value) + '</span></article>'
      ).join("");
    }

    function renderRibbon() {
      const path = state.path || {};
      const flow = path.flow || {};
      const hops = path.hops || [];
      if (!hops.length) {
        $("ribbon").innerHTML = '<div class="empty">No hops to preview.</div>';
        return;
      }
      const parts = ['<div class="ribbon-track" aria-label="Path overview">', endpoint(flow.src || "source")];
      hops.forEach((hop, index) => {
        const check = checkForDevice(hop.device);
        const observed = check?.observed || "";
        const mismatch = state.validation && check && predictedHopReachable(hop, index) !== (observed === "reachable");
        parts.push('<span class="link" aria-hidden="true"></span>');
        parts.push('<button type="button" class="ribbon-hop' + (mismatch ? " mismatch-hop" : "") + '" data-scroll-hop="' + index + '" title="' + esc(ribbonTitle(hop, check)) + '">' +
          ribbonDot(hop, index, observed) +
          '<span class="name">' + esc(hop.device || "hop " + (index + 1)) + '</span>' +
        '</button>');
      });
      parts.push('<span class="link" aria-hidden="true"></span>', endpoint(flow.dst || "destination"), '</div>');
      $("ribbon").innerHTML = parts.join("");
    }

    function ribbonDot(hop, index, observed) {
      if (observed) {
        const meta = observedMeta[observed] || observedMeta.inconclusive;
        return '<span class="observed-ring ' + esc(meta.tone) + '" aria-hidden="true" title="Observed: ' + esc(meta.label) + '"></span>';
      }
      return '<span class="dot ' + esc(hopTone(hop, index)) + '" aria-hidden="true" title="Predicted"></span>';
    }

    function predictedHopReachable(hop, index) {
      const verdict = state.path?.verdict;
      const last = index === ((state.path?.hops || []).length - 1);
      if (last) return verdict === "delivered";
      if (hop.acl_match && String(hop.acl_match.action || "").toLowerCase() === "deny") return false;
      if (hop.policy_match && String(hop.policy_match.action || "").toLowerCase() === "deny") return false;
      return true;
    }

    function ribbonTitle(hop, check) {
      const parts = [hop.device, hop.vendor, hopDecision(hop)];
      if (check?.observed) parts.push("observed " + check.observed);
      if (check?.target) parts.push("target " + check.target);
      return parts.filter(Boolean).join(" - ");
    }

    function endpoint(value) {
      return '<span class="endpoint mono">' + esc(value) + '</span>';
    }

    function hopTone(hop, index) {
      const verdict = state.path?.verdict;
      const last = index === ((state.path?.hops || []).length - 1);
      if (last && verdict === "delivered") return "ok";
      if (last && (verdict === "dropped_acl" || verdict === "dropped_policy")) return "bad";
      if (last && (verdict === "no_route" || verdict === "loop")) return "warn";
      if (hop.acl_match && String(hop.acl_match.action || "").toLowerCase() === "deny") return "bad";
      if (hop.policy_match && String(hop.policy_match.action || "").toLowerCase() === "deny") return "bad";
      return "neutral";
    }

    function renderHops() {
      const hops = state.path?.hops || [];
      if (!hops.length) {
        $("hopList").innerHTML = '<div class="empty">No hop data is present in this path.</div>';
        return;
      }
      const html = hops.map((hop, index) => renderHop(hop, index)).join("");
      if (!html.trim()) {
        $("hopList").innerHTML = '<div class="empty">No decision points in this path for the current view mode.</div>';
        return;
      }
      $("hopList").innerHTML = html;
      $("hopList").querySelectorAll("details").forEach((details) => {
        const index = Number(details.dataset.index);
        details.open = state.open.has(index);
      });
    }

    function renderHop(hop, index) {
      const focus = state.focusedHop === index ? ' data-focused="true"' : "";
      const check = checkForDevice(hop.device);
      const observed = check?.observed || "";
      const mismatch = state.validation && check && predictedHopReachable(hop, index) !== (observed === "reachable");
      const observedChip = observed ? chip("observed " + observed) : "";
      const mismatchChip = mismatch ? '<span class="chip" style="color:var(--warn);border-color:color-mix(in srgb,var(--warn) 45%,var(--border));background:var(--warn-soft)">disagree</span>' : "";
      const diffMeta = diffHopMeta(index);
      const diffClass = diffMeta ? " diff-" + diffMeta : "";
      const pipeline = renderPipeline(hop);
      const showHop = state.viewMode !== "decisions" || pipeline || evidenceItems(hop).length;
      if (!showHop) return "";
      return '<details class="hop' + diffClass + '" id="hop-' + index + '" data-index="' + index + '"' + focus + '>' +
        '<summary tabindex="0" aria-label="Hop ' + (index + 1) + ', ' + esc(hop.device || "unnamed") + '">' +
          '<div class="hop-head">' +
            '<span class="chevron" aria-hidden="true">&gt;</span>' +
            '<div class="hop-title"><strong>' + esc(index + 1) + '. ' + esc(hop.device || "unknown device") + '</strong>' + vendorBadge(hop.vendor) + '</div>' +
            '<div class="hop-meta">' + hopChips(hop).join("") + observedChip + mismatchChip + '</div>' +
          '</div>' +
        '</summary>' +
        '<div class="hop-body">' +
          renderCompare(hop, index, check) +
          '<div class="diag-toolbar">' +
            '<span class="layer-tag observed">Live diagnostic</span>' +
            renderDiagMenu(hop, index) +
          '</div>' +
          renderHopDiag(index) +
          renderPipeline(hop) +
          renderEvidenceList(hop, index) +
        '</div>' +
      '</details>';
    }

    function renderCompare(hop, index, check) {
      const diag = state.hopDiag[index];
      if (!check && !diag) return "";
      const predictedText = hopDecision(hop) || "traversed";
      let observedText = "not validated";
      if (check) {
        observedText = [check.type, check.target, check.observed, formatCheckResult(check.result)].filter(Boolean).join(" · ");
      } else if (diag) {
        observedText = [diag.command, diag.status, diag.rendered_command].filter(Boolean).join(" · ");
      }
      const disagree = state.validation && check && predictedHopReachable(hop, index) !== (check.observed === "reachable");
      return '<div class="compare-grid" aria-label="Predicted vs observed for hop ' + (index + 1) + '">' +
        '<article class="compare-card predicted">' +
          '<div class="heading"><span class="layer-tag predicted">Prédit</span><strong>Compiled decision</strong></div>' +
          '<p>' + esc(predictedText) + '</p>' +
        '</article>' +
        '<article class="compare-card observed' + (disagree ? " disagree" : "") + '">' +
          '<div class="heading"><span class="layer-tag observed">Observé</span><strong>Live check</strong></div>' +
          '<p>' + esc(observedText) + '</p>' +
        '</article>' +
      '</div>';
    }

    function formatCheckResult(result) {
      if (!result) return "";
      const parts = [];
      if (result.loss_pct !== undefined) parts.push("loss " + result.loss_pct + "%");
      if (result.rtt_avg_ms !== undefined) parts.push("rtt " + result.rtt_avg_ms + " ms");
      return parts.join(", ");
    }

    function renderDiagMenu(hop, index) {
      const dst = state.path?.flow?.dst || "";
      const nextHop = hop.next_hop || "";
      const showCmd = hop.vendor && String(hop.vendor).toLowerCase().includes("juniper")
        ? "show route"
        : "show ip route";
      return '<details class="diag-menu">' +
        '<summary>Diagnostiquer</summary>' +
        '<div class="diag-menu-panel" role="menu">' +
          '<button type="button" role="menuitem" data-diag-action="' + index + ':ping:' + esc(nextHop) + '"' + (nextHop ? "" : " disabled") + '>Ping next hop</button>' +
          '<button type="button" role="menuitem" data-diag-action="' + index + ':traceroute:' + esc(dst) + '"' + (dst ? "" : " disabled") + '>Traceroute dst</button>' +
          '<button type="button" role="menuitem" data-diag-action="' + index + ':show:' + esc(showCmd) + '">Show route</button>' +
          '<button type="button" role="menuitem" data-diag-action="' + index + ':exec:show session all" data-class="exec">Exec (needs approval)</button>' +
          '<button type="button" role="menuitem" disabled data-class="config" title="Config commands are denied by default">Configure terminal (denied)</button>' +
        '</div>' +
      '</details>';
    }

    function renderHopDiag(index) {
      const diag = state.hopDiag[index];
      if (!diag) return "";
      return renderDiagResult(diag, index);
    }

    function renderDiagResult(diag, hopIndex) {
      const status = diag.status || "error";
      const meta = diagStatusMeta[status] || diagStatusMeta.error;
      const cls = diag.class || "diagnostic";
      const parts = [
        '<section class="diag-panel observed" aria-label="Diagnostic result">' ,
        '<div class="diag-head">' +
          '<div style="display:grid;gap:6px">' +
            '<span class="diag-status ' + esc(meta.tone) + '"><span aria-hidden="true">' + esc(meta.icon) + '</span>' + esc(meta.label) + '</span>' +
            '<div class="diag-meta">' +
              classBadge(cls) +
              (diag.command ? chip(diag.command) : "") +
              (diag.target ? chip(diag.target) : "") +
            '</div>' +
          '</div>' +
          auditLine(diag) +
        '</div>'
      ];
      if (diag.rendered_command) {
        parts.push('<pre class="diag-command" aria-label="Rendered command">' + esc(diag.rendered_command) + '</pre>');
      }
      if (diag.parsed?.ping) parts.push(renderPingStats(diag.parsed.ping));
      if (diag.parsed?.traceroute?.hops?.length) parts.push(renderTraceroute(diag.parsed.traceroute.hops));
      if (status === "needs_approval") parts.push(renderApprovalEncart(diag, hopIndex));
      if (diag.raw_output) {
        parts.push(
          '<details class="raw-output">' +
            '<summary>Sortie redigée <span class="redacted-note">(live, non-deterministic)</span></summary>' +
            '<pre>' + esc(diag.raw_output) + '</pre>' +
          '</details>'
        );
      } else if (status !== "needs_approval" && status !== "denied") {
        parts.push('<p class="redacted-note">No raw output reported.</p>');
      }
      if (diag.approval?.reason && status !== "needs_approval") {
        parts.push('<p class="redacted-note">' + esc(diag.approval.reason) + '</p>');
      }
      parts.push('</section>');
      return parts.join("");
    }

    function classBadge(cls) {
      const value = cls || "diagnostic";
      return '<span class="class-badge ' + esc(value) + '">' + esc(value) + '</span>';
    }

    function auditLine(diag) {
      const bits = [];
      if (diag.audit_id) bits.push("audit " + diag.audit_id);
      if (diag.started_at) bits.push(diag.started_at);
      if (diag.duration_ms !== undefined && diag.duration_ms !== null) bits.push(diag.duration_ms + " ms");
      if (!bits.length) return "";
      return '<div class="audit-line">' + esc(bits.join(" · ")) + '</div>';
    }

    function renderPingStats(ping) {
      const stats = [
        ["Sent", ping.sent],
        ["Received", ping.received],
        ["Loss", ping.loss_pct !== undefined ? ping.loss_pct + "%" : ""],
        ["RTT avg", ping.rtt_avg_ms !== undefined ? ping.rtt_avg_ms + " ms" : ""]
      ];
      return '<div class="diag-stats" aria-label="Ping statistics">' +
        stats.map(([label, value]) =>
          '<div class="diag-stat"><span class="label">' + esc(label) + '</span><span class="value">' + esc(value ?? "—") + '</span></div>'
        ).join("") +
      '</div>';
    }

    function renderTraceroute(hops) {
      return '<ol class="traceroute-list" aria-label="Traceroute hops">' +
        hops.map((hop) =>
          '<li><span>' + esc(hop.ttl ?? "?") + '</span><span>' + esc(hop.host || "unknown") + '</span><span>' + esc(hop.rtt_ms !== undefined ? hop.rtt_ms + " ms" : "—") + '</span></li>'
        ).join("") +
      '</ol>';
    }

    function renderApprovalEncart(diag, hopIndex) {
      const approval = diag.approval || {};
      return '<div class="approval-encart" role="region" aria-label="Approval required">' +
        '<strong>Approval required</strong>' +
        '<p>' + esc(approval.reason || "This command needs server-side approval before execution.") + '</p>' +
        '<p class="mono">' + esc(diag.rendered_command || "") + '</p>' +
        '<div class="approval-row">' +
          '<label>Approval token' +
            '<input type="text" data-approval-token="' + hopIndex + '" placeholder="Paste approval token" autocomplete="off" spellcheck="false">' +
          '</label>' +
          '<button type="button" data-approval-retry="' + hopIndex + '">Retry with approval</button>' +
        '</div>' +
      '</div>';
    }

    function vendorBadge(vendor) {
      if (!vendor) return "";
      const normalized = String(vendor).toLowerCase();
      const marks = [
        ["cisco", "ci"], ["juniper", "jn"], ["pan", "pa"], ["forti", "ft"],
        ["mikrotik", "mt"], ["routeros", "mt"], ["aruba", "ar"], ["hpe", "hp"]
      ];
      const found = marks.find(([needle]) => normalized.includes(needle));
      const mark = found ? found[1] : normalized.slice(0, 2);
      return '<span class="vendor" data-mark="' + esc(mark) + '">' + esc(vendor) + '</span>';
    }

    function hopChips(hop) {
      const chips = [];
      if (hop.ingress_iface) chips.push(chip("in " + hop.ingress_iface));
      if (hop.ingress_zone) chips.push(chip("zone " + hop.ingress_zone));
      if (hop.egress_iface) chips.push(chip("out " + hop.egress_iface));
      if (hop.egress_zone) chips.push(chip("zone " + hop.egress_zone));
      if (hop.next_hop) chips.push(chip("next " + hop.next_hop));
      return chips;
    }

    function chip(text) {
      return '<span class="chip">' + esc(text) + '</span>';
    }

    function hasFirewallPipeline(hop) {
      return Boolean(hop.ingress_zone || hop.egress_zone || hop.policy_match || hop.nat_applied);
    }

    function renderPipeline(hop) {
      const decisionsOnly = state.viewMode === "decisions";
      if (hasFirewallPipeline(hop)) {
        const policy = hop.policy_match;
        const policyAction = String(policy?.action || "").toLowerCase();
        const defs = [
          ["Ingress", [hop.ingress_iface, hop.ingress_zone].filter(Boolean).join(" / ") || "not reported", "", false],
          ["Route", routeText(hop.route_match) || "direct or not reported", "", Boolean(hop.route_match)],
          ["Policy", policyText(policy), policyAction === "deny" ? "bad" : (policy ? "ok" : ""), Boolean(policy)],
          ["NAT", natText(hop.nat_applied) || "not applied", "", Boolean(hop.nat_applied)],
          ["Egress", [hop.egress_iface, hop.egress_zone].filter(Boolean).join(" / ") || "not reported", "", false]
        ];
        const html = defs
          .filter(([, , , decision]) => !decisionsOnly || decision)
          .map(([label, value, tone, decision]) => step(label, value, tone, decision))
          .join("");
        if (decisionsOnly && !html) return "";
        return '<div class="pipeline' + (decisionsOnly ? " decisions-only" : "") + '" aria-label="Firewall pipeline">' + html + '</div>';
      }
      const defs = [
        ["Ingress", hop.ingress_iface || "not reported", "", false],
        ["Route", routeText(hop.route_match) || "not reported", "", Boolean(hop.route_match)],
        ["ACL", aclText(hop.acl_match), String(hop.acl_match?.action || "").toLowerCase() === "deny" ? "bad" : (hop.acl_match ? "ok" : ""), Boolean(hop.acl_match)],
        ["Egress", hop.egress_iface || "not reported", "", false],
        ["Next hop", hop.next_hop || "not reported", "", false]
      ];
      const html = defs
        .filter(([, , , decision]) => !decisionsOnly || decision)
        .map(([label, value, tone, decision]) => step(label, value, tone, decision))
        .join("");
      if (decisionsOnly && !html) return "";
      return '<div class="pipeline' + (decisionsOnly ? " decisions-only" : "") + '" aria-label="L3 pipeline">' + html + '</div>';
    }

    function step(label, value, tone, isDecision) {
      const decisionClass = isDecision ? " decision" : "";
      return '<div class="step ' + esc(tone || "") + decisionClass + '"><span class="label">' + esc(label) + '</span><span class="value">' + esc(value || "not reported") + '</span></div>';
    }

    function routeText(route) {
      if (!route) return "";
      return [route.destination, route.next_hop || route.interface].filter(Boolean).join(" via ");
    }

    function aclText(acl) {
      if (!acl) return "not reported";
      return [acl.action, acl.protocol, acl.match || acl.raw].filter(Boolean).join(" ");
    }

    function policyText(policy) {
      if (!policy) return "not reported";
      return [policy.name, policy.action, policy.service].filter(Boolean).join(" / ");
    }

    function natText(nat) {
      if (!nat) return "";
      return [nat.name, nat.from_zone, nat.to_zone, nat.action || nat.translated].filter(Boolean).join(" / ");
    }

    function hopDecision(hop) {
      if (hop.policy_match) return policyText(hop.policy_match);
      if (hop.acl_match) return aclText(hop.acl_match);
      if (hop.route_match) return routeText(hop.route_match);
      return hop.next_hop ? "next " + hop.next_hop : "";
    }

    function evidenceItems(hop) {
      const items = [];
      if (hop.route_match?.evidence) items.push({ label: "Route", evidence: hop.route_match.evidence, tone: "neutral" });
      if (hop.acl_match?.evidence) items.push({ label: "ACL", evidence: hop.acl_match.evidence, tone: String(hop.acl_match.action || "").toLowerCase() === "deny" ? "bad" : "ok" });
      if (hop.policy_match?.evidence) items.push({ label: "Policy", evidence: hop.policy_match.evidence, tone: String(hop.policy_match.action || "").toLowerCase() === "deny" ? "bad" : "ok" });
      if (hop.nat_applied?.evidence) items.push({ label: "NAT", evidence: hop.nat_applied.evidence, tone: "neutral" });
      return items;
    }

    function renderEvidenceList(hop, index) {
      const items = evidenceItems(hop);
      if (!items.length) return '<div class="empty">No evidence object is present for this hop.</div>';
      return '<div class="evidence-grid">' + items.map((item, itemIndex) => renderEvidence(item, index, itemIndex)).join("") + '</div>';
    }

    function renderEvidence(item, hopIndex, itemIndex) {
      const ev = item.evidence || {};
      const line = ev.start_line || "?";
      const fileLine = (ev.file || "unknown") + ":" + line;
      return '<article class="evidence-card" style="--evidence-match:' + evidenceColor(item.tone) + '">' +
        '<div class="evidence-head">' +
          '<div class="evidence-title"><h3>' + esc(item.label) + '</h3><code>' + esc(fileLine) + '</code></div>' +
          '<div class="evidence-actions">' +
            '<button type="button" data-copy-evidence="' + hopIndex + ':' + itemIndex + '" aria-label="Copy evidence for ' + esc(item.label) + '">Copy</button>' +
            '<button type="button" data-open-evidence="' + hopIndex + ':' + itemIndex + '" aria-label="Open file line for ' + esc(item.label) + '">Open</button>' +
          '</div>' +
        '</div>' +
        '<pre class="conf" tabindex="0">' + renderRawBlock(ev) + '</pre>' +
      '</article>';
    }

    function evidenceColor(tone) {
      if (tone === "ok") return "var(--ok-soft)";
      if (tone === "bad") return "var(--bad-soft)";
      return "var(--accent-soft)";
    }

    function renderRawBlock(ev) {
      const raw = String(ev?.raw_block || "");
      if (!raw) return '<span class="code-line"><span class="line-no">?</span><code>No raw block reported</code></span>';
      const lines = raw.split("\n");
      const start = Number(ev.start_line || 1);
      const end = Number(ev.end_line || start);
      return lines.map((line, offset) => {
        const lineNo = start + offset;
        const isMatch = lineNo >= start && lineNo <= end;
        const klass = isMatch ? "match" : "context";
        return '<span class="code-line ' + klass + '"><span class="line-no">' + esc(lineNo) + '</span><code>' + esc(line || " ") + '</code></span>';
      }).join("");
    }

    function renderLegend() {
      const items = [
        '<span class="pill"><span class="layer-tag predicted">Prédit</span> compiled verdict</span>',
        '<span class="pill"><span class="layer-tag observed">Observé</span> live check</span>',
        '<span class="pill"><span class="dot ok" aria-hidden="true"></span> delivered or reachable</span>',
        '<span class="pill"><span class="dot bad" aria-hidden="true"></span> dropped or unreachable</span>',
        '<span class="pill"><span class="dot warn" aria-hidden="true"></span> no route, loop, or mismatch</span>',
        '<span class="pill"><span class="dot neutral" aria-hidden="true"></span> traversed or inconclusive</span>'
      ];
      $("legend").innerHTML = items.join("");
    }

    function evidenceByIndex(key) {
      const [hopIndex, itemIndex] = key.split(":").map(Number);
      const hop = state.path?.hops?.[hopIndex];
      return evidenceItems(hop || [])[itemIndex]?.evidence || null;
    }

    async function copyText(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    }

    async function copyEvidence(key) {
      const ev = evidenceByIndex(key);
      if (!ev) return;
      await copyText(ev.raw_block || "");
      setStatus("Evidence copied");
    }

    function openEvidence(key) {
      const ev = evidenceByIndex(key);
      if (!ev || !ev.file) return;
      const url = state.editorTemplate
        .replaceAll("{path}", encodeURIComponent(ev.file))
        .replaceAll("{line}", encodeURIComponent(ev.start_line || 1));
      const opened = window.open(url, "_blank", "noopener,noreferrer");
      if (!opened) {
        copyText(ev.file + ":" + (ev.start_line || 1));
        setStatus("File line copied because the editor URL could not open");
      }
    }

    function saveOpenState() {
      localStorage.setItem("netc.path.open", JSON.stringify([...state.open].sort((a, b) => a - b)));
    }

    function setFocusedHop(index) {
      const hops = state.path?.hops || [];
      if (!hops.length) return;
      state.focusedHop = Math.max(0, Math.min(index, hops.length - 1));
      const summary = document.querySelector('#hop-' + state.focusedHop + ' summary');
      summary?.focus();
    }

    function toggleHop(index) {
      const details = document.querySelector('#hop-' + index);
      if (!details) return;
      details.open = !details.open;
      if (details.open) state.open.add(index);
      else state.open.delete(index);
      saveOpenState();
    }

    function openAndScrollHop(index) {
      if (index < 0) return;
      state.open.add(index);
      saveOpenState();
      renderHops();
      const hop = document.getElementById("hop-" + index);
      hop?.scrollIntoView({ block: "start" });
      hop?.querySelector("summary")?.focus();
      state.focusedHop = index;
    }

    function initEvents() {
      $("flowForm").addEventListener("submit", (event) => {
        event.preventDefault();
        traceFlow(true);
      });
      $("validateButton").addEventListener("click", () => validatePath());
      $("rerunValidateButton").addEventListener("click", () => validatePath());
      $("copyValidationButton").addEventListener("click", async () => {
        if (!state.validation) return;
        await copyText(JSON.stringify(state.validation, null, 2));
        setStatus("Validation JSON copied");
      });
      $("copyPermalinkButton").addEventListener("click", async () => {
        const flow = flowFromInputs();
        const url = location.origin + flowURL(flow, state.validation ? { validated: "1" } : {});
        await copyText(url);
        setStatus("Permalink copied");
      });
      $("viewModeSelect").value = state.viewMode;
      $("viewModeSelect").addEventListener("change", (event) => {
        state.viewMode = event.target.value;
        localStorage.setItem("netc.path.viewMode", state.viewMode);
        renderHops();
      });
      $("diffModeToggle").checked = state.diffMode;
      $("diffModeToggle").addEventListener("change", (event) => {
        state.diffMode = event.target.checked;
        localStorage.setItem("netc.path.diffMode", state.diffMode ? "1" : "0");
        if (!state.diffMode) clearDiff();
        setDiffStatus(state.diffMode ? "Diff mode on — mark before or trace twice" : "");
      });
      $("markBeforeButton").addEventListener("click", () => {
        if (!state.path) return;
        state.pathBefore = JSON.parse(JSON.stringify(state.path));
        state.pathAfter = null;
        setDiffStatus("Before path marked — trace again for after");
        renderDiffBanner();
      });
      $("themeButton").addEventListener("click", () => {
        const dark = document.documentElement.dataset.theme !== "dark";
        document.documentElement.dataset.theme = dark ? "dark" : "light";
        localStorage.setItem("netc.path.theme", dark ? "dark" : "light");
        $("themeButton").textContent = dark ? "Light" : "Dark";
        $("themeButton").setAttribute("aria-pressed", String(dark));
      });
      $("copyJsonButton").addEventListener("click", async () => {
        if (!state.path) return;
        await copyText(JSON.stringify(state.path, null, 2));
        setStatus("Path JSON copied");
      });
      $("saveEditorButton").addEventListener("click", () => {
        state.editorTemplate = $("editorTemplate").value.trim() || "vscode://file/{path}:{line}";
        localStorage.setItem("netc.path.editor", state.editorTemplate);
        setStatus("Editor URL saved");
      });
      document.addEventListener("click", (event) => {
        const fixture = event.target.closest("[data-fixture]")?.dataset.fixture;
        if (fixture) loadFixture(fixture);
        const diagFixture = event.target.closest("[data-diag-fixture]")?.dataset.diagFixture;
        if (diagFixture) loadDiagFixture(diagFixture);
        const diagAction = event.target.closest("[data-diag-action]")?.dataset.diagAction;
        if (diagAction) {
          const parsed = parseDiagAction(diagAction);
          if (parsed) {
            event.target.closest(".diag-menu")?.removeAttribute("open");
            runDiag(parsed.hopIndex, parsed.command, parsed.args);
          }
        }
        const approvalRetry = event.target.closest("[data-approval-retry]")?.dataset.approvalRetry;
        if (approvalRetry !== undefined) {
          const hopIndex = Number(approvalRetry);
          const pending = state.pendingDiag[hopIndex];
          const tokenInput = document.querySelector('[data-approval-token="' + hopIndex + '"]');
          const token = tokenInput?.value?.trim() || "";
          state.approvalTokens[hopIndex] = token;
          if (pending) runDiag(hopIndex, pending.command, pending.args, token);
        }
        const scrollHop = event.target.closest("[data-scroll-hop]")?.dataset.scrollHop;
        if (scrollHop !== undefined) openAndScrollHop(Number(scrollHop));
        const reasonHop = event.target.closest("[data-reason-hop]")?.dataset.reasonHop;
        if (reasonHop !== undefined) openAndScrollHop(Number(reasonHop));
        const copyKey = event.target.closest("[data-copy-evidence]")?.dataset.copyEvidence;
        if (copyKey) copyEvidence(copyKey);
        const openKey = event.target.closest("[data-open-evidence]")?.dataset.openEvidence;
        if (openKey) openEvidence(openKey);
        const historyIndex = event.target.closest("[data-history-index]")?.dataset.historyIndex;
        if (historyIndex !== undefined) restoreValidationHistory(Number(historyIndex));
        if (event.target.id === "clearDiffButton") clearDiff();
      });
      $("hopList").addEventListener("input", (event) => {
        const tokenInput = event.target.closest("[data-approval-token]");
        if (!tokenInput) return;
        state.approvalTokens[Number(tokenInput.dataset.approvalToken)] = tokenInput.value.trim();
      });
      $("hopList").addEventListener("toggle", (event) => {
        if (!event.target.matches("details.hop")) return;
        const index = Number(event.target.dataset.index);
        if (event.target.open) state.open.add(index);
        else state.open.delete(index);
        saveOpenState();
      }, true);
      $("hopList").addEventListener("focusin", (event) => {
        const details = event.target.closest("details.hop");
        if (details) state.focusedHop = Number(details.dataset.index);
      });
      document.addEventListener("keydown", (event) => {
        const tag = event.target.tagName.toLowerCase();
        if (["input", "select", "textarea"].includes(tag)) return;
        if (event.key === "ArrowDown") {
          event.preventDefault();
          setFocusedHop(state.focusedHop + 1);
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          setFocusedHop(state.focusedHop <= 0 ? 0 : state.focusedHop - 1);
        } else if (event.key === "Enter" && state.focusedHop >= 0) {
          event.preventDefault();
          toggleHop(state.focusedHop);
        } else if (event.key.toLowerCase() === "c" && state.focusedHop >= 0) {
          const first = evidenceItems(state.path?.hops?.[state.focusedHop] || [])[0]?.evidence;
          if (first) copyText(first.raw_block || "").then(() => setStatus("Focused evidence copied"));
        }
      });
    }

    function initTheme() {
      const theme = localStorage.getItem("netc.path.theme") || "light";
      document.documentElement.dataset.theme = theme;
      $("themeButton").textContent = theme === "dark" ? "Light" : "Dark";
      $("themeButton").setAttribute("aria-pressed", String(theme === "dark"));
    }

    async function init() {
      initTheme();
      initEvents();
      $("editorTemplate").value = state.editorTemplate;
      $("viewModeSelect").value = state.viewMode;
      $("diffModeToggle").checked = state.diffMode;
      if (state.diffMode) setDiffStatus("Diff mode on — mark before or trace twice");
      renderGallery("");
      renderDiagGallery("");
      renderValidationHistory();
      const params = new URLSearchParams(location.search);
      const fixture = params.get("fixture");
      if (fixture && fixture.startsWith("diag/")) {
        await loadDiagFixture(fixture);
        return;
      }
      if (params.has("src") || params.has("dst") || params.has("proto")) {
        $("srcInput").value = params.get("src") || "";
        $("dstInput").value = params.get("dst") || "";
        $("protoInput").value = params.get("proto") || "tcp";
        $("dportInput").value = params.get("dport") || "";
        await traceFlow(false);
        if (params.get("validated") === "1") {
          await validatePath();
        }
      } else {
        await loadFixture("delivered");
      }
    }

    init();
  </script>
</body>
</html>
