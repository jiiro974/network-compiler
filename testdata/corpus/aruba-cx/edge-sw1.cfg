! ArubaOS-CX (6200/6300/8320 series) - running-config
! Syntax family: IOS-like but VLAN membership set on interface via
! "vlan access" / "vlan trunk allowed"; ip address uses x/len; L2 by default
!
hostname edge-sw1
!
ntp server 10.0.0.123
logging 10.0.0.50
snmp-server community public
!
vlan 10
    name USERS
vlan 20
    name VOICE
vlan 99
    name MGMT
!
interface 1/1/1
    description user-access
    no shutdown
    vlan access 10
!
interface 1/1/24
    description uplink-core
    no shutdown
    vlan trunk native 1
    vlan trunk allowed 10,20,99
!
interface 1/1/48
    description unused
    shutdown
!
interface vlan 99
    description management
    ip address 10.0.99.2/24
!
ip route 0.0.0.0/0 10.0.99.1
ip route 192.168.50.0/24 10.0.99.254
!
end
