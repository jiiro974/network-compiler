!
! FS.com FSOS (S5800/S5860 series) - running-config
! Syntax family: Cisco-IOS-like, distinctive eth-0-N naming and ip address x/len
!
hostname edge-sw1
!
service password-encryption
username netadmin privilege 15 password 0 S3cr3tP@ss
snmp-server community 0 public ro
sntp enable
sntp server 10.0.0.123
!
vlan database
 vlan 10 name USERS
 vlan 20 name VOICE
 vlan 99 name MGMT
!
interface eth-0-1
 description user-access
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface eth-0-24
 description uplink-core
 switchport mode trunk
 switchport trunk allowed only 10,20,99
 no shutdown
!
interface eth-0-48
 description unused
 shutdown
!
interface vlan 99
 description management-svi
 ip address 10.0.99.2/24
 no shutdown
!
management ip address 10.0.99.2/24
!
ip route 0.0.0.0 0.0.0.0 10.0.99.1
ip route 192.168.50.0 255.255.255.0 10.0.99.254
!
end
