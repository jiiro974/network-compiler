! Cisco NX-OS (Nexus 9000/3000) - running-config
! Syntax family: IOS-like but requires "feature" toggles; ip address uses x/len
!
hostname edge-sw1
!
feature interface-vlan
feature lldp
!
ntp server 10.0.0.123
logging server 10.0.0.50 5
snmp-server community public group network-operator
!
vlan 10
  name USERS
vlan 20
  name VOICE
vlan 99
  name MGMT
!
interface Ethernet1/1
  description user-access
  switchport
  switchport mode access
  switchport access vlan 10
  no shutdown
!
interface Ethernet1/24
  description uplink-core
  switchport
  switchport mode trunk
  switchport trunk allowed vlan 10,20,99
  no shutdown
!
interface Ethernet1/48
  description unused
  shutdown
!
interface Vlan99
  description management
  ip address 10.0.99.2/24
  no shutdown
!
ip route 0.0.0.0/0 10.0.99.1
ip route 192.168.50.0/24 10.0.99.254
