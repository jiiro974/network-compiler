#
# Huawei VRP (S5700/S6700 series) - display current-configuration
# Syntax family: VRP - '#' section separators, Vlanif interfaces, port link-type
#
sysname edge-sw1
#
snmp-agent community read cipher public
ntp-service unicast-server 10.0.0.123
info-center loghost 10.0.0.50
#
vlan batch 10 20 99
vlan 10
 description USERS
vlan 20
 description VOICE
vlan 99
 description MGMT
#
interface GigabitEthernet0/0/1
 description user-access
 port link-type access
 port default vlan 10
#
interface GigabitEthernet0/0/24
 description uplink-core
 port link-type trunk
 port trunk allow-pass vlan 10 20 99
#
interface GigabitEthernet0/0/48
 description unused
 shutdown
#
interface Vlanif99
 description management
 ip address 10.0.99.2 255.255.255.0
#
ip route-static 0.0.0.0 0.0.0.0 10.0.99.1
ip route-static 192.168.50.0 255.255.255.0 10.0.99.254
#
return
