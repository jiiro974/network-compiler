; HP ProCurve (2610 / 2910al / 5400zl, classic) - running-config
; Syntax family: VLAN-centric (same lineage as ArubaOS-Switch); membership under
; each "vlan" block via tagged/untagged; "ip route" and "interface" for names only
;
hostname "edge-sw1"
snmp-server community "public" operator
timesync sntp
sntp unicast
sntp server priority 1 10.0.0.123
logging 10.0.0.50
;
vlan 1
   name "DEFAULT_VLAN"
   no untagged 1-48
   exit
vlan 10
   name "USERS"
   untagged 1
   tagged 24
   exit
vlan 20
   name "VOICE"
   tagged 24
   exit
vlan 99
   name "MGMT"
   tagged 24
   ip address 10.0.99.2 255.255.255.0
   exit
;
interface 1
   name "user-access"
   exit
interface 24
   name "uplink-core"
   exit
interface 48
   name "unused"
   disable
   exit
;
ip route 0.0.0.0 0.0.0.0 10.0.99.1
ip route 192.168.50.0 255.255.255.0 10.0.99.254
;
