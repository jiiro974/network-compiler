# Extreme EXOS (Switch Engine, X440/X460 series) - show configuration
# Syntax family: EXOS verb-first - "create/configure/enable" + VLAN-centric;
# VLAN membership assigned per port with tagged/untagged, routes via iproute
configure snmp sysName "edge-sw1"
configure ntp server add 10.0.0.123
configure syslog add 10.0.0.50 vr VR-Default local0
enable snmp access
configure snmp add community readonly "public"
create vlan "USERS" tag 10
create vlan "VOICE" tag 20
create vlan "MGMT" tag 99
configure vlan USERS add ports 1 untagged
configure vlan USERS add ports 24 tagged
configure vlan VOICE add ports 24 tagged
configure vlan MGMT add ports 24 tagged
configure vlan MGMT ipaddress 10.0.99.2 255.255.255.0
configure ports 1 description-string "user-access"
configure ports 24 description-string "uplink-core"
disable ports 48
enable ipforwarding vlan MGMT
configure iproute add default 10.0.99.1
configure iproute add 192.168.50.0/24 10.0.99.254
