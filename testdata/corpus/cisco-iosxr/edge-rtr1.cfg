! Cisco IOS-XR (ASR9000 / NCS) - running-config
! Syntax family: IOS-like but with "!"-closed stanzas, ipv4 address x mask,
! dot1q subinterfaces for VLANs, and "router static / address-family" for routes
!
hostname edge-rtr1
!
ntp server 10.0.0.123
!
snmp-server community public RO
logging 10.0.0.50 vrf default
!
interface GigabitEthernet0/0/0/2
 description user-access
 ipv4 address 10.0.10.254 255.255.255.0
!
interface GigabitEthernet0/0/0/1.10
 description users
 ipv4 address 10.0.10.1 255.255.255.0
 encapsulation dot1q 10
!
interface GigabitEthernet0/0/0/1.20
 description voice
 ipv4 address 10.0.20.1 255.255.255.0
 encapsulation dot1q 20
!
interface GigabitEthernet0/0/0/1.99
 description management
 ipv4 address 10.0.99.2 255.255.255.0
 encapsulation dot1q 99
!
interface GigabitEthernet0/0/0/48
 description unused
 shutdown
!
router static
 address-family ipv4 unicast
  0.0.0.0/0 10.0.99.1
  192.168.50.0/24 10.0.99.254
 !
!
end
