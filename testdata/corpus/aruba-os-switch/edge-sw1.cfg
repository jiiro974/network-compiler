; ArubaOS-Switch (ex-ProCurve, 2530/2930 series) - running-config
; Syntax family: VLAN-centric - membership declared under each "vlan" block
; via tagged/untagged port lists (NOT under the interface)
;
hostname "edge-sw1"
snmp-server community "public" unrestricted
timesync ntp
ntp server 10.0.0.123
logging 10.0.0.50
;
vlan 10
   name "USERS"
   untagged 1
   tagged 24
   exit
vlan 20
   name "VOICE"
   tagged 24
   exit
vlan 99
   name "MGMT"
   tagged 24
   ip address 10.0.99.2 255.255.255.0
   exit
;
interface 1
   name "user-access"
   exit
interface 24
   name "uplink-core"
   exit
interface 48
   name "unused"
   disable
   exit
;
ip route 0.0.0.0 0.0.0.0 10.0.99.1
ip route 192.168.50.0 255.255.255.0 10.0.99.254
