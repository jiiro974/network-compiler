#
# HPE Comware 7 (FlexFabric 5900 / 5130 / 1950, ex-H3C) - display current-configuration
# Syntax family: Comware - '#' separators, Vlan-interface, port link-type / permit
#
 sysname edge-sw1
#
 snmp-agent community read public
 ntp-service unicast-server 10.0.0.123
 info-center loghost 10.0.0.50
#
 vlan 10
  name USERS
 vlan 20
  name VOICE
 vlan 99
  name MGMT
#
interface GigabitEthernet1/0/1
 description user-access
 port link-mode bridge
 port link-type access
 port access vlan 10
#
interface GigabitEthernet1/0/24
 description uplink-core
 port link-mode bridge
 port link-type trunk
 port trunk permit vlan 10 20 99
#
interface GigabitEthernet1/0/48
 description unused
 shutdown
#
interface Vlan-interface99
 description management
 ip address 10.0.99.2 255.255.255.0
#
 ip route-static 0.0.0.0 0 10.0.99.1
 ip route-static 192.168.50.0 24 10.0.99.254
#
return
