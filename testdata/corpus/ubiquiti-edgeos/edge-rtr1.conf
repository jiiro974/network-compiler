# Ubiquiti EdgeOS (EdgeRouter) - "show configuration commands" output
# Syntax family: Vyatta set-form (sibling of VyOS); VLANs as ethN vif <id>
set system host-name 'edge-rtr1'
set system ntp server '10.0.0.123'
set system syslog host '10.0.0.50' facility all level 'info'
set service snmp community 'public' authorization 'ro'
set interfaces ethernet eth1 description 'user-access'
set interfaces ethernet eth1 vif 10 description 'USERS'
set interfaces ethernet eth1 vif 10 address '10.0.10.1/24'
set interfaces ethernet eth0 description 'uplink-core'
set interfaces ethernet eth0 vif 20 description 'VOICE'
set interfaces ethernet eth0 vif 20 address '10.0.20.1/24'
set interfaces ethernet eth0 vif 99 description 'MGMT'
set interfaces ethernet eth0 vif 99 address '10.0.99.2/24'
set interfaces ethernet eth2 disable
set protocols static route 0.0.0.0/0 next-hop '10.0.99.1'
set protocols static route 192.168.50.0/24 next-hop '10.0.99.254'
