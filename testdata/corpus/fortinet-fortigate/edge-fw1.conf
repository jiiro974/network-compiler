# Fortinet FortiGate (FortiOS 7.x) - show / config output
# Syntax family: FortiOS "config ... / edit ... / set ... / next / end" blocks
config system global
    set hostname "edge-fw1"
end
config system ntp
    set ntpsync enable
    config ntpserver
        edit 1
            set server "10.0.0.123"
        next
    end
end
config system snmp community
    edit 1
        set name "public"
        config hosts
            edit 1
                set ip 10.0.0.50 255.255.255.255
            next
        end
    next
end
config system interface
    edit "port1"
        set alias "uplink-core"
        set ip 10.0.99.2 255.255.255.0
        set allowaccess ping https ssh
    next
    edit "vlan10-users"
        set vdom "root"
        set ip 10.0.10.1 255.255.255.0
        set type vlan
        set vlanid 10
        set interface "port2"
    next
    edit "vlan20-voice"
        set vdom "root"
        set ip 10.0.20.1 255.255.255.0
        set type vlan
        set vlanid 20
        set interface "port2"
    next
    edit "port48"
        set status down
    next
end
config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 10.0.99.1
        set device "port1"
    next
    edit 2
        set dst 192.168.50.0 255.255.255.0
        set gateway 10.0.99.254
        set device "port1"
    next
end
config system zone
    edit "internal"
        set interface "vlan10-users" "vlan20-voice"
    next
    edit "wan"
        set interface "port1"
    next
end
config firewall policy
    edit 1
        set name "users-to-lab"
        set srcintf "vlan10-users"
        set dstintf "port1"
        set action accept
        set service "HTTPS"
    next
    edit 2
        set name "ssh-deny"
        set srcintf "vlan10-users"
        set dstintf "port1"
        set action deny
        set service "SSH"
    next
end
