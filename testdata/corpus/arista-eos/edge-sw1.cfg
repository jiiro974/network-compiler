! Arista EOS - running-config
! Syntax family: Cisco-IOS-like; note ip address uses prefix-length (x/len)
!
hostname edge-sw1
!
ntp server 10.0.0.123
logging host 10.0.0.50
snmp-server community public ro
!
vlan 10
   name USERS
vlan 20
   name VOICE
vlan 99
   name MGMT
!
interface Ethernet1
   description user-access
   switchport mode access
   switchport access vlan 10
!
interface Ethernet24
   description uplink-core
   switchport mode trunk
   switchport trunk allowed vlan 10,20,99
!
interface Ethernet48
   description unused
   shutdown
!
interface Vlan99
   description management
   ip address 10.0.99.2/24
!
ip routing
ip route 0.0.0.0/0 10.0.99.1
ip route 192.168.50.0/24 10.0.99.254
!
end
